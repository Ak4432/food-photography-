<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al Zafira - Food Photography</title>
  
  <!-- Load React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Load Babel to understand JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0b]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const StaticImageComparison = ({ beforeSrc, afterSrc }) => {
      return (
        <div className="flex flex-col md:flex-row gap-4 md:gap-6 w-full">
          {/* BEFORE IMAGE (LEFT) */}
          <div className="flex-1 relative aspect-square md:aspect-[4/3] rounded-sm overflow-hidden shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
            <img 
              src={beforeSrc} 
              alt="Raw Food Photography" 
              className="absolute inset-0 w-full h-full object-cover"
              draggable="false"
            />
            <div className="absolute top-4 left-4 z-20">
              <div className="bg-black/40 backdrop-blur-md text-white/90 px-4 py-1.5 rounded-full text-xs font-medium tracking-widest uppercase border border-white/10 shadow-lg">
                Before
              </div>
            </div>
          </div>

          {/* AFTER IMAGE (RIGHT) */}
          <div className="flex-1 relative aspect-square md:aspect-[4/3] rounded-sm overflow-hidden shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
            <img 
              src={afterSrc} 
              alt="Enhanced Food Photography" 
              className="absolute inset-0 w-full h-full object-cover"
              draggable="false"
            />
            {/* Subtle Vignette overlay for the enhanced image */}
            <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_30%,rgba(0,0,0,0.4)_120%)] pointer-events-none"></div>
            <div className="absolute top-4 right-4 z-20">
              <div className="bg-black/40 backdrop-blur-md text-white/90 px-4 py-1.5 rounded-full text-xs font-medium tracking-widest uppercase border border-white/10 shadow-lg">
                After
              </div>
            </div>
          </div>
        </div>
      );
    };

    const portfolioData = [
      {
        before: "https://res.cloudinary.com/dutt5ibzr/image/upload/v1776350978/jva0szobskcvzcw2nu56.jpg",
        after: "https://res.cloudinary.com/dutt5ibzr/image/upload/v1776352301/l226fi6mmuqgf7ttbc7w.png"
      },
      {
        before: "https://res.cloudinary.com/dutt5ibzr/image/upload/v1776350981/btj2jrihb0ziwpqdvnkp.jpg",
        after: "https://res.cloudinary.com/dutt5ibzr/image/upload/v1776352271/qgwdehyixzg4e5oafmps.png"
      },
      {
        before: "https://res.cloudinary.com/db7r7c4e5/image/upload/v1776833412/yvocicftg2u3wrx8irjj.jpg",
        after: "https://res.cloudinary.com/db7r7c4e5/image/upload/v1776837864/rojct0gplaijjwvyfmuc.png"
      },
      {
        before: "https://res.cloudinary.com/db7r7c4e5/image/upload/v1776833411/wznnluesouohcrhmzdwf.jpg",
        after: "https://res.cloudinary.com/db7r7c4e5/image/upload/v1776833514/azejotstdwmmgjtwzsgs.png"
      },
      {
        before: "https://res.cloudinary.com/db7r7c4e5/image/upload/v1776833411/lxpabqms4ows31unnuhq.jpg",
        after: "https://res.cloudinary.com/db7r7c4e5/image/upload/v1776833516/zzxdq6fvjzzrh2cvhhbi.png"
      },
      {
        before: "https://res.cloudinary.com/dutt5ibzr/image/upload/v1776351033/yvn0vfqzssiy72npkyn3.png",
        after: "https://res.cloudinary.com/dutt5ibzr/image/upload/v1776352380/ids3rtow4v2qk79egncy.png"
      },
      {
        before: "https://res.cloudinary.com/db7r7c4e5/image/upload/v1776836080/ofkzecshiecjef2fovoz.jpg",
        after: "https://res.cloudinary.com/db7r7c4e5/image/upload/v1776838173/wxxprxosnwy21hkszbzs.png"
      },
      {
        before: "https://res.cloudinary.com/dutt5ibzr/image/upload/v1776351054/akbtynamockfv41wxwv7.jpg",
        after: "https://res.cloudinary.com/dutt5ibzr/image/upload/v1776352556/efwzv18tk95rindj19y9.png"
      }
    ];

    function App() {
      return (
        <div className="min-h-screen bg-[#0a0a0b] text-zinc-200 font-sans selection:bg-zinc-800">
          {/* Navigation / Header Area */}
          <nav className="w-full border-b border-white/5 bg-black/20">
            <div className="relative max-w-7xl mx-auto px-6 h-20 flex items-center justify-center md:justify-between">
              <div className="hidden md:block w-20"></div>
              <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-sm font-semibold tracking-widest uppercase text-white/90 whitespace-nowrap">
                Al <span className="text-zinc-500">Zafira</span>
              </div>
              <div className="hidden md:flex text-xs font-medium tracking-widest uppercase text-zinc-500">
                <a href="#" className="text-white hover:text-white transition-colors">Our Work</a>
              </div>
            </div>
          </nav>

          <main className="max-w-7xl mx-auto px-6 py-16 md:py-24">
            <div className="max-w-3xl mx-auto text-center mb-16 md:mb-24">
              <h1 className="text-4xl md:text-5xl lg:text-6xl font-light tracking-tight text-white mb-6">
                The Art of <span className="font-medium">Appetite</span>
              </h1>
              <p className="text-zinc-400 text-lg md:text-xl font-light leading-relaxed max-w-2xl mx-auto">
                Transforming flat, natural-light captures into breathtaking culinary masterpieces. Notice the restoration of deep cinematic contrast, crisp surface textures, and glossy moisture retention.
          </p>
        </div>

        {/* Portfolio Gallery */}
        <div className="flex flex-col gap-12 md:gap-24 mb-16">
          {portfolioData.map((item, index) => (
            <StaticImageComparison 
              key={index} 
              beforeSrc={item.before} 
              afterSrc={item.after} 
            />
          ))}
        </div>

        <div className="text-center">
          <p className="text-zinc-500 text-sm font-light tracking-wide flex items-center justify-center gap-2">
                <span className="w-1 h-1 rounded-full bg-zinc-600"></span>
                Professional Food Photography Enhancement
                <span className="w-1 h-1 rounded-full bg-zinc-600"></span>
              </p>
            </div>
            
            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-4xl mx-auto mt-24 pt-16 border-t border-white/5">
              <div className="text-center">
                <h3 className="text-white font-medium text-sm tracking-widest uppercase mb-3">Lighting & Depth</h3>
                <p className="text-zinc-500 text-sm font-light leading-relaxed">Recovered high dynamic range with soft side lighting. Emphasized the f/2.8 shallow depth of field for natural subject isolation.</p>
              </div>
              <div className="text-center">
                <h3 className="text-white font-medium text-sm tracking-widest uppercase mb-3">Texture & Moisture</h3>
                <p className="text-zinc-500 text-sm font-light leading-relaxed">Selectively sharpened micro-contrast to highlight crispy surfaces and glossy sauce reflections without artificial stylization.</p>
              </div>
              <div className="text-center">
                <h3 className="text-white font-medium text-sm tracking-widest uppercase mb-3">Color Grading</h3>
                <p className="text-zinc-500 text-sm font-light leading-relaxed">Removed flat green/yellow color casts. Introduced a rich, cinematic color profile that maintains true-to-life ingredient accuracy.</p>
              </div>
            </div>

            {/* Contact / WhatsApp Call to Action */}
            <div className="mt-24 text-center">
              <div className="inline-flex flex-col items-center justify-center p-8 md:px-16 border border-white/5 bg-white/[0.02] rounded-2xl backdrop-blur-sm transition-colors hover:bg-white/[0.04]">
                <p className="text-zinc-400 text-xs font-medium tracking-widest uppercase mb-3">
                  Ready to transform your visuals?
                </p>
                <p className="text-lg md:text-xl font-light tracking-wide flex flex-col md:flex-row items-center gap-2 md:gap-3">
                  <span className="text-zinc-500">Contact / WhatsApp:</span>
                  <a 
                    href="https://wa.me/917498038027" 
                    target="_blank" 
                    rel="noopener noreferrer" 
                    className="text-white font-medium hover:text-zinc-300 transition-colors"
                  >
                    7498038027
                  </a>
                </p>
                
                <a 
                  href="https://cal.com/aashik-lsfv7z" 
                  target="_blank" 
                  rel="noopener noreferrer"
                  className="mt-8 px-8 py-3.5 border border-white/20 bg-white/5 text-white text-xs font-semibold tracking-widest uppercase rounded hover:bg-white hover:text-black transition-all duration-300 shadow-lg"
                >
                  Update Your Business
                </a>
              </div>
            </div>
          </main>

          {/* Footer */}
          <footer className="w-full border-t border-white/5 mt-8 py-8 flex flex-col items-center gap-4 bg-black/20">
            <p className="text-zinc-600 text-xs tracking-widest uppercase font-medium">
              © 2026 Al Zafira Post-Production
            </p>
          </footer>
        </div>
      );
    }

    // Render the React application inside the <div id="root">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
